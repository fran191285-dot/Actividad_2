<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Market | Menú Principal</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #15151a;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 243, 255, 0.05) 2px, rgba(0, 243, 255, 0.05) 4px);
        }

        /* --- BOTÓN PARA ABRIR LA VENTANA --- */
        .btn-flotante {
            position: absolute;
            top: 30px;
            right: 30px;
            background-color: var(--neon-pink);
            color: #fff;
            border: none;
            padding: 15px 20px;
            font-family: 'VT323', monospace;
            font-size: 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transition: transform 0.2s;
            z-index: 100;
        }

        .btn-flotante:hover {
            transform: scale(1.05);
            background-color: #ff3399;
        }

        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 2px solid var(--neon-pink);
            background: linear-gradient(180deg, #1a0014 0%, var(--bg-dark) 100%);
        }

        h1 {
            font-family: 'VT323', monospace;
            font-size: 4rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            letter-spacing: 2px;
        }

        .descripcion {
            max-width: 800px;
            margin: 20px auto 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* --- VENTANA FLOTANTE DEL FORMULARIO (MODAL) --- */
        #ventana-formulario {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 20px;
            right: 20px;
            width: 350px;
            background-color: #111115;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid var(--neon-pink);
            box-shadow: -5px 5px 30px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 0, 127, 0.2);
            z-index: 1000; /* Siempre arriba de todo */
            max-height: 90vh;
            overflow-y: auto;
        }

        #ventana-formulario h2 {
            font-family: 'VT323', monospace;
            color: var(--neon-pink);
            margin-top: 0;
            font-size: 1.8rem;
            text-align: center;
        }

        .formulario-columna {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            background-color: #0a0a0c;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 243, 255, 0.3);
        }

        .btn-submit {
            width: 100%;
            background-color: var(--neon-cyan);
            color: #000;
            font-size: 1.1rem;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .btn-submit:hover {
            background-color: #00c4cc;
        }

        .btn-cerrar {
            width: 100%;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid #555;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-cerrar:hover {
            background-color: #333;
            color: #fff;
        }
        /* ------------------------------------ */

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
        }

        .card:hover::before { transform: scaleX(1); }

        .producto-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
            background-color: #000;
        }

        .card h3 {
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            color: #fff;
        }

        .badges { margin-bottom: 15px; }

        .badge {
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--neon-cyan);
            margin-right: 8px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .badge.clave {
            background: rgba(255, 0, 127, 0.1);
            color: var(--neon-pink);
            border-color: var(--neon-pink);
        }

        .detalle {
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .precio {
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            color: var(--neon-cyan);
            margin: 20px 0;
            margin-top: auto;
        }

        .botones {
            display: flex;
            gap: 10px;
        }

        button.btn-card {
            flex: 1;
            padding: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-comprar {
            background-color: var(--neon-cyan);
            color: #000;
        }

        .btn-comprar:hover { background-color: #00c4cc; }

        .btn-datos {
            background-color: transparent;
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
        }

        .btn-datos:hover { background-color: rgba(255, 0, 127, 0.1); }
    </style>
</head>
<body>

    <button class="btn-flotante" onclick="abrirVentana()">+ Añadir Reliquia</button>

    <header>
        <h1>RETRO MARKET</h1>
        <p class="descripcion">MENÚ PRINCIPAL: Catálogo de tecnología retro, consolas clásicas y computadoras vintage.</p>
    </header>

    <div id="ventana-formulario">
        <h2>Nueva Publicación</h2>
        <form id="formAgregar" onsubmit="agregarProducto(event)">
            <div class="formulario-columna">
                <input type="text" id="nuevo-id" placeholder="ID (Ej: RTM-1004) [CLAVE]" required>
                <input type="text" id="nuevo-nombre" placeholder="Nombre del producto" required>
                <input type="text" id="nueva-categoria" placeholder="Categoría" required>
                <input type="number" id="nuevo-anio" placeholder="Año de lanzamiento" required>
                <input type="text" id="nuevo-estado" placeholder="Estado (Ej: Usado)" required>
                <input type="number" id="nuevo-precio" placeholder="Precio ($)" required>
                <input type="url" id="nueva-imagen" placeholder="URL de la imagen" required>
            </div>
            <button type="submit" class="btn-submit">Guardar Registro</button>
            <button type="button" class="btn-cerrar" onclick="cerrarVentana()">Volver al Menú Principal</button>
        </form>
    </div>

    <div class="container" id="catalogo">
        </div>

    <script>
        // ESTRUCTURA DE DATOS
        const inventario = [
            {
                id_producto: "RTM-1001", 
                nombre: "Super Nintendo (SNES)",
                categoria: "Consola de Videojuegos",
                anio_lanzamiento: 1990,
                estado_conservacion: "Caja Sellada (Mint Condition)",
                precio: 250000,
                imagen: "https://images.unsplash.com/photo-1510657597147-3801f4c7c88b?crop=entropy&cs=tinysrgb&fit=crop&fm=jpg&h=400&w=600"
            },
            {
                id_producto: "RTM-1002", 
                nombre: "Commodore 64",
                categoria: "Computadora Vintage",
                anio_lanzamiento: 1982,
                estado_conservacion: "Restaurado - Funcional",
                precio: 180000,
                imagen: "https://images.unsplash.com/photo-1629161742461-9c60e34c3873?crop=entropy&cs=tinysrgb&fit=crop&fm=jpg&h=400&w=600"
            },
            {
                id_producto: "RTM-1003", 
                nombre: "Cartucho The Legend of Zelda (NES)",
                categoria: "Cartucho de Colección",
                anio_lanzamiento: 1987,
                estado_conservacion: "Usado con detalles estéticos",
                precio: 45000,
                imagen: "https://images.unsplash.com/photo-1605901309584-818e25960b8f?crop=entropy&cs=tinysrgb&fit=crop&fm=jpg&h=400&w=600"
            }
        ];

        // FUNCIONES DE VENTANA (NUEVAS)
        function abrirVentana() {
            document.getElementById('ventana-formulario').style.display = 'block';
        }

        function cerrarVentana() {
            document.getElementById('ventana-formulario').style.display = 'none';
        }

        // RENDERIZAR PRODUCTOS
        function renderizarProductos() {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = ''; 

            inventario.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${item.imagen}" alt="${item.nombre}" class="producto-img"> 
                    <h3>${item.nombre}</h3>
                    <div class="badges">
                        <span class="badge clave" title="Clave del Registro">ID: ${item.id_producto}</span>
                        <span class="badge">Año ${item.anio_lanzamiento}</span>
                    </div>
                    <p class="detalle"><strong>Categoría:</strong> ${item.categoria}</p>
                    <p class="detalle"><strong>Estado:</strong> ${item.estado_conservacion}</p>
                    <div class="precio">$${item.precio.toLocaleString('es-AR')}</div>
                    <div class="botones">
                        <button class="btn-card btn-comprar" onclick="alert('Iniciando proceso de compra para: ${item.nombre}')">Comprar</button>
                        <button class="btn-card btn-datos" onclick="verRegistro('${item.id_producto}')">Ver Registro</button>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        // MOSTRAR DATOS CRUDOS
        function verRegistro(idBusqueda) {
            const registroEncontrado = inventario.find(item => item.id_producto === idBusqueda);
            
            const mensaje = `ESTRUCTURA DEL REGISTRO:\n\n` +
                            `Clave (id_producto): ${registroEncontrado.id_producto}\n` +
                            `Nombre: ${registroEncontrado.nombre}\n` +
                            `Categoría: ${registroEncontrado.categoria}\n` +
                            `Año: ${registroEncontrado.anio_lanzamiento}\n` +
                            `Estado: ${registroEncontrado.estado_conservacion}\n` +
                            `Precio: $${registroEncontrado.precio}\n\n` +
                            `*Representación en JSON:*\n` + 
                            JSON.stringify(registroEncontrado, null, 2);
            
            alert(mensaje);
        }

        // AGREGAR NUEVO REGISTRO
        function agregarProducto(event) {
            event.preventDefault();

            const nuevoRegistro = {
                id_producto: document.getElementById('nuevo-id').value,
                nombre: document.getElementById('nuevo-nombre').value,
                categoria: document.getElementById('nueva-categoria').value,
                anio_lanzamiento: parseInt(document.getElementById('nuevo-anio').value),
                estado_conservacion: document.getElementById('nuevo-estado').value,
                precio: parseFloat(document.getElementById('nuevo-precio').value),
                imagen: document.getElementById('nueva-imagen').value
            };

            inventario.push(nuevoRegistro);
            renderizarProductos();
            
            document.getElementById('formAgregar').reset();
            alert('¡Nueva reliquia añadida exitosamente al inventario!');
            
            // Cerrar la ventana automáticamente tras añadir el registro
            cerrarVentana();
        }

        window.onload = renderizarProductos;
    </script>
</body>
</html>
