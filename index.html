<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Market | Tecnología Vintage</title>
    <!-- Fuente retro de Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --card-bg: #15151a;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            background-image: 
                linear-gradient(rgba(10, 10, 12, 0.9), rgba(10, 10, 12, 0.9)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 243, 255, 0.05) 2px, rgba(0, 243, 255, 0.05) 4px);
        }

        header {
            text-align: center;
            padding: 60px 20px;
            border-bottom: 2px solid var(--neon-pink);
            background: linear-gradient(180deg, #1a0014 0%, var(--bg-dark) 100%);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2);
        }

        h1 {
            font-family: 'VT323', monospace;
            font-size: 4rem;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink), 0 0 20px var(--neon-pink);
            letter-spacing: 2px;
        }

        .descripcion {
            max-width: 800px;
            margin: 20px auto 0;
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
        }

        .card:hover::before { transform: scaleX(1); }

        .card h3 {
            font-size: 1.5rem;
            margin: 0 0 15px 0;
            color: #fff;
        }

        .badges { margin-bottom: 15px; }

        .badge {
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            padding: 4px 10px;
            border-radius: 4px;
            border: 1px solid var(--neon-cyan);
            margin-right: 8px;
            display: inline-block;
        }

        .badge.clave {
            background: rgba(255, 0, 127, 0.1);
            color: var(--neon-pink);
            border-color: var(--neon-pink);
        }

        .detalle {
            margin: 8px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .precio {
            font-family: 'VT323', monospace;
            font-size: 2.5rem;
            color: var(--neon-cyan);
            margin: 20px 0;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        .botones {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-comprar {
            background-color: var(--neon-cyan);
            color: #000;
        }

        .btn-comprar:hover { background-color: #00c4cc; }

        .btn-datos {
            background-color: transparent;
            color: var(--neon-pink);
            border: 1px solid var(--neon-pink);
        }

        .btn-datos:hover { background-color: rgba(255, 0, 127, 0.1); }
    </style>
</head>
<body>

    <header>
        <h1>RETRO MARKET</h1>
        <p class="descripcion">Una plataforma especializada en la compra y venta de tecnología retro, consolas de videojuegos clásicas, computadoras vintage y cartuchos de colección. Los usuarios pueden listar sus reliquias tecnológicas detallando su estado de conservación.</p>
    </header>

    <div class="container" id="catalogo">
        <!-- Los productos se cargarán aquí por JS -->
    </div>

    <script>
        // ESTA ES LA ESTRUCTURA DEL REGISTRO (ARREGLO DE OBJETOS)
        const inventario = [
            {
                id_producto: "RTM-1001", // CLAVE PRINCIPAL
                nombre: "Super Nintendo (SNES)",
                categoria: "Consola de Videojuegos",
                anio_lanzamiento: 1990,
                estado_conservacion: "Caja Sellada (Mint Condition)",
                precio: 250000
                imagen:"https://images.unsplash.com/photo-1534224039826-c7a0c07316c9?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60"
            },
            {
                id_producto: "RTM-1002", // CLAVE PRINCIPAL
                nombre: "Commodore 64",
                categoria: "Computadora Vintage",
                anio_lanzamiento: 1982,
                estado_conservacion: "Restaurado - Funcional",
                precio: 180000
                imagen: "https://images.unsplash.com/photo-1629255319024-9ad074fcf8ad?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60"
            },
            {
                id_producto: "RTM-1003", // CLAVE PRINCIPAL
                nombre: "Cartucho The Legend of Zelda (NES)",
                categoria: "Cartucho de Colección",
                anio_lanzamiento: 1987,
                estado_conservacion: "Usado con detalles estéticos",
                precio: 45000
                imagen: "https://images.unsplash.com/photo-1605901309584-818e25960b8f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=60"
            }
        ];

        // Función para renderizar el HTML basado en los datos
        function renderizarProductos() {
            const contenedor = document.getElementById('catalogo');
            
            inventario.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <h3>${item.nombre}</h3>
                    <div class="badges">
                        <span class="badge clave" title="Clave del Registro">ID: ${item.id_producto}</span>
                        <span class="badge">Año ${item.anio_lanzamiento}</span>
                    </div>
                    <p class="detalle"><strong>Categoría:</strong> ${item.categoria}</p>
                    <p class="detalle"><strong>Estado:</strong> ${item.estado_conservacion}</p>
                    <div class="precio">$${item.precio.toLocaleString('es-AR')}</div>
                    
                    <div class="botones">
                        <button class="btn-comprar" onclick="alert('Iniciando proceso de compra para: ${item.nombre}')">Comprar</button>
                        <button class="btn-datos" onclick="verRegistro('${item.id_producto}')">Ver Registro</button>
                    </div>
                `;
                contenedor.appendChild(card);
            });
        }

        // Función para demostrar la lectura de la estructura de datos por consola/alerta
        function verRegistro(idBusqueda) {
            // Buscamos el registro usando la Clave
            const registroEncontrado = inventario.find(item => item.id_producto === idBusqueda);
            
            // Formateamos el objeto para mostrarlo de forma académica
            const mensaje = `ESTRUCTURA DEL REGISTRO:\n\n` +
                            `Clave (id_producto): ${registroEncontrado.id_producto}\n` +
                            `Nombre: ${registroEncontrado.nombre}\n` +
                            `Categoría: ${registroEncontrado.categoria}\n` +
                            `Año: ${registroEncontrado.anio_lanzamiento}\n` +
                            `Estado: ${registroEncontrado.estado_conservacion}\n` +
                            `Precio: ${registroEncontrado.precio}\n\n` +
                            `*Representación en memoria (JSON):*\n` + 
                            JSON.stringify(registroEncontrado, null, 2);
            
            alert(mensaje);
        }

        // Iniciar la app al cargar
        window.onload = renderizarProductos;
    </script>
</body>
</html>
    </script>
</body>
</html>
